name: build

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Build on the supported JDKs, against the pinned 26.0 line and a later 26.x
        # to confirm the provider stays compatible across the whole 26.x line.
        java: ['17', '21']
        keycloak: ['26.0.8', '26.6.4']
    name: jdk ${{ matrix.java }} / keycloak ${{ matrix.keycloak }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          cache: maven
      - name: Build and test
        run: mvn -B -Dkeycloak.version=${{ matrix.keycloak }} verify
      - name: Upload provider JAR
        if: matrix.java == '21' && matrix.keycloak == '26.0.8'
        uses: actions/upload-artifact@v4
        with:
          name: caputchin-keycloak
          path: target/caputchin-keycloak.jar
          if-no-files-found: error
