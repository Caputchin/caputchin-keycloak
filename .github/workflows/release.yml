name: release

# release-please drives versioning + the changelog from Conventional Commits.
#
# 1. On every push to main it maintains an open "release vX.Y.Z" PR with the
#    computed version bump, the CHANGELOG update, and the version synced into
#    pom.xml (the line annotated x-release-please-version) via the configured
#    extra-files.
# 2. Merging that PR creates the git tag + GitHub Release.
# 3. The package job builds the provider JAR and attaches it to the GitHub Release,
#    so the published artifact is always a CI build, never a hand-built tree.
#
# Prereq: a GitHub App with RELEASE_APP_ID / RELEASE_APP_PRIVATE_KEY granted to
# this repo as organization secrets.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      # App token (not GITHUB_TOKEN) so the release PR's commits trigger CI and
      # the push can pass branch protection.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

  # Build the provider JAR and attach it to the release.
  package:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build the provider JAR
        run: mvn -B -DskipTests package
      - name: Attach the JAR to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: gh release upload "$TAG" target/caputchin-keycloak.jar --clobber

  # Publish the signed artifact (plus sources and javadoc) to Maven Central via the Sonatype
  # Central Portal, on every release. Requires the one-time setup to be complete: the
  # com.caputchin namespace verified on central.sonatype.com, the CENTRAL_TOKEN_USERNAME /
  # CENTRAL_TOKEN_PASSWORD and GPG_PRIVATE_KEY / PASSPHRASE secrets present (provisioned via
  # Terraform from Infisical), and the GPG public key on a keyserver.
  publish-maven:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
      - name: Publish to Maven Central
        run: mvn -B -Prelease -DskipTests deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.PASSPHRASE }}
